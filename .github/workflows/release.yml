name: Release artifacts

on:
  push:
    branches: [main]
  pull_request:        # build check only — no release is touched
  release:
    types: [published, created, edited]
  workflow_dispatch:

permissions:
  contents: write

# Serialise builds that touch the same release tag (avoids racing pre-release updates).
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build everything
        run: make build

      - name: Package site bundle
        run: cd output && zip -qr site.zip site

      - name: Build timestamp
        id: meta
        run: echo "timestamp=$(date -u +'%Y-%m-%d %H:%M:%SZ')" >> "$GITHUB_OUTPUT"

      # Push to main (or manual run): keep a rolling "pre-release" up to date.
      - name: Update pre-release
        if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'workflow_dispatch'
        uses: ncipollo/release-action@v1
        with:
          tag: pre-release
          name: "Pre-release — ${{ steps.meta.outputs.timestamp }}"
          body: "Automated build at ${{ steps.meta.outputs.timestamp }} (UTC). Latest slides (PDF/HTML), site bundle and catalogue."
          prerelease: true
          allowUpdates: true
          removeArtifacts: false
          artifacts: "output/talks/**/*.pdf,output/talks/**/*.html,output/site.zip,output/index.json"
          token: ${{ secrets.GITHUB_TOKEN }}

      # Official release published in GitHub: attach the same artifacts to it.
      - name: Attach artifacts to official release
        if: github.event_name == 'release'
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ github.event.release.tag_name }}
          allowUpdates: true
          removeArtifacts: false
          artifacts: "output/talks/**/*.pdf,output/talks/**/*.html,output/site.zip,output/index.json"
          token: ${{ secrets.GITHUB_TOKEN }}
