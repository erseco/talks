name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate talk metadata
        run: make validate

      - name: Build site
        run: make build

      - name: Upload site artifact
        uses: actions/upload-artifact@v7
        with:
          name: site
          path: output/site
          if-no-files-found: error
